services:
  postgres:
    image: postgres:16-alpine
    container_name: ramo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ramo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ramo_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ramo_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ramo}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
